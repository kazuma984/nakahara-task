function ShiftEditModal({mn,time,slot,onSave,onDel,onClose}){const[tp,setTp]=useState(slot?slot.t:"業務");const[dt,setDt]=useState(slot?slot.d:"");return(<div onClick={onClose} style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.35)"}}><div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:14,padding:"24px",maxWidth:400,width:"92%",boxShadow:"0 20px 60px rgba(0,0,0,0.18)"}}><h3 style={{fontSize:16,fontWeight:700,marginBottom:4}}>シフト編集</h3><p style={{fontSize:12,color:"#64748b",marginBottom:16}}>{mn}・{time}</p><div style={{marginBottom:14}}><label style={{fontSize:13,fontWeight:600,color:"#475569",display:"block",marginBottom:6}}>種別</label><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{SLT.map(s=>{const c=SC[s];return<button key={s} onClick={()=>setTp(s)} style={{padding:"6px 14px",borderRadius:8,fontSize:13,fontWeight:600,border:tp===s?"2px solid "+c.c:"1px solid #e2e8f0",background:tp===s?c.bg:"#fff",color:tp===s?c.c:"#94a3b8"}}>{s}</button>})}</div></div><div style={{marginBottom:20}}><label style={{fontSize:13,fontWeight:600,color:"#475569",display:"block",marginBottom:6}}>内容</label><textarea value={dt} onChange={e=>setDt(e.target.value)} placeholder="業務内容..." rows={4} style={{width:"100%",padding:"10px 12px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:14,outline:"none",resize:"vertical",minHeight:80}}/></div><div style={{display:"flex",gap:8}}>{slot&&<button onClick={onDel} style={{padding:"10px 16px",background:"#fef2f2",color:"#ef4444",border:"none",borderRadius:8,fontSize:13,fontWeight:600}}>削除</button>}<div style={{flex:1}}/><button onClick={onClose} style={{padding:"10px 16px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,fontSize:13,fontWeight:600}}>戻る</button><button onClick={()=>{if(dt.trim())onSave({t:tp,d:dt.trim()})}} style={{padding:"10px 20px",background:"#2563eb",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontW /* Shift */
function ShiftPanel({members,shifts,onUpd}){const[sf,setSf]=useState("all");const[ei,setEi]=useState(null);const[ar,setAr]=useState(false);const[nt,setNt2]=useState("");const idx=sf==="all"?members.map((_,i)=>i):[members.indexOf(sf)].filter(i=>i>=0&&i<members.length);const noD=sf!=="all"&&!members.includes(sf);const now=nowT();
  const cellClick=(ri,mi)=>{const r=shifts[ri];if(!r)return;setEi({ri,ci:mi,mn:members[mi]||"メンバー",time:r.time,slot:r.s&&r.s[mi]||null})};
  const sv=(ns)=>{if(!ei)return;onUpd(shifts.map((r,i)=>{if(i!==ei.ri)return r;const s=[...r.s];while(s.length<=ei.ci)s.push(null);s[ei.ci]=ns;return{...r,s}}));setEi(null)};
  const dl=()=>{if(!ei)return;onUpd(shifts.map((r,i)=>{if(i!==ei.ri)return r;const s=[...r.s];s[ei.ci]=null;return{...r,s}}));setEi(null)};
  const addRow=()=>{if(!nt||shifts.some(r=>r.time===nt))return;const n={time:nt,s:Array(Math.max(members.length,8)).fill(null)};const u=[...shifts,n].sort((a,b)=>{let ta=t2m(a.time),tb=t2m(b.time);if(ta<960)ta+=1440;if(tb<960)tb+=1440;return ta-tb});onUpd(u);setAr(false);setNt2("")};
  const delRow=(i)=>{if(!confirm(shifts[i].time+" 削除？"))return;onUpd(shifts.filter((_,j)=>j!==i))};
  return(<div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",marginBottom:16,overflow:"hidden"}}><div style={{padding:"14px 18px 10px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><h3 style={{fontSize:15,fontWeight:700}}>📋 シフト表</h3><div style={{display:"flex",gap:6}}><span style={{fontSize:12,color:"#64748b",background:"#f1f5f9",padding:"3px 10px",borderRadius:6}}>現在{now}</span><button onClick={()=>setAr(!ar)} style={{fontSize:10,color:"#fff",background:"#2563eb",border:"none",borderRadius:6,padding:"3px 10px",fontWeight:600}}>{ar?"✕":"＋時間"}</button></div></div><p style={{fontSize:10,color:"#94a3b8",marginTop:4}}>セルタップで編集</p><div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}><button style={{...P.pill,...(sf==="all"?P.pillAct:{})}} onClick={()=>setSf("all")}>全員</button>{members.map((m,i)=><button key={m} style={{...P.pill,...(sf===m?{background:mc(i),color:"#fff",borderColor:mc(i)}:{})}} onClick={()=>setSf(m)}>{m}</button>)}</div></div>
    {ar&&<div style={{padding:"10px 18px",borderTop:"1px solid #f1f5f9",background:"#fafbfc",display:"flex",gap:8,alignItems:"center"}}><input type="time" value={nt} onChange={e=>setNt2(e.target.value)} style={{padding:"8px 12px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:14,outline:"none"}}/><button onClick={addRow} style={{padding:"8px 16px",background:"#2563eb",color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:600}}>追加</button></div>}
    {noD?<div style={{padding:"24px",textAlign:"center",color:"#94a3b8",fontSize:13}}>データなし</div>:(<div style={{overflowX:"auto",padding:"0 0 10px"}}><table style={{borderCollapse:"collapse",width:"100%",minWidth:sf==="all"?1000:350}}><thead><tr><th style={P.th}>時刻</th>{idx.map(i=><th key={i} style={P.th}><span style={{width:7,height:7,borderRadius:"50%",background:mc(i),display:"inline-block",marginRight:4}}/>{members[i]}</th>)}</tr></thead><tbody>{shifts.map((row,ri)=>{const isN=row.time<=now&&(ri+1<shifts.length?shifts[ri+1].time>now:true);return(<tr key={ri} style={{background:isN?"#eff6ff":ri%2===0?"#fafbfc":"#fff"}}><td style={{...P.timeCell,...(isN?{color:"#2563eb",fontWeight:700}:{})}}><div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"center"}}>{isN&&"▶"}{row.time}<button onClick={()=>delRow(ri)} style={{background:"none",border:"none",color:"#d1d5db",fontSize:9}}>✕</button></div></td>{idx.map(mi=>{const s=row.s&&row.s[mi];if(!s)return<td key={mi} style={{padding:"4px"}}><div className="shift-empty" onClick={()=>cellClick(ri,mi)}><span style={{color:"#d1d5db",fontSize:16}}>+</span></div></td>;const c=SC[s.t]||SC["業務"];return<td key={mi} style={{padding:"3px"}}><div className="shift-cell" onClick={()=>cellClick(ri,mi)} style={{background:c.bg,border:"1px solid "+c.b,padding:"4px 7px",fontSize:11,color:c.c,fontWeight:500,lineHeight:1.4,maxHeight:48,overflow:"hidden"}}><b>{s.t}</b> {s.d.split("\n")[0].substring(0,25)}</div></td>})}</tr>)})}</tbody></table></div>)}
    {ei&&<ShiftEditModal mn={ei.mn} time={ei.time} slot={ei.slot} onSave={sv} onDel={dl} onClose={()=>setEi(null)}/>}

/* Customer */
function CustPanel({custs,onUpd}){const[ad,setAd]=useState(false);const[nc,setNc]=useState({n:"",dl:"",dv:""});const[ec,setEc]=useState(null);const now=nowM();const nt=nowT();const sorted=[...custs].sort((a,b)=>t2m(a.delivery)-t2m(b.delivery));
  const cycle=(id)=>{const o=["preparing","packed","delivered"];const t=nowT();onUpd(custs.map(c=>{if(c.id!==id)return c;const ni=(o.indexOf(c.status)+1)%3;const u={...c,status:o[ni]};if(o[ni]==="packed")u.packedAt=t;if(o[ni]==="delivered")u.deliveredAt=t;if(o[ni]==="preparing"){u.packedAt=null;u.deliveredAt=null}return u}))};
  const addC=()=>{if(!nc.n.trim()||!nc.dl||!nc.dv)return;onUpd([...custs,{id:uid(),name:nc.n.trim(),deadline:nc.dl,delivery:nc.dv,status:"preparing"}]);setNc({n:"",dl:"",dv:""});setAd(false)};
  const delC=(id)=>{if(confirm("削除？"))onUpd(custs.filter(c=>c.id!==id))};
  const svE=(id,dl,dv)=>{onUpd(custs.map(c=>c.id===id?{...c,deadline:dl,delivery:dv}:c));setEc(null)};
  const reset=()=>{if(confirm("全リセット？"))onUpd(custs.map(c=>({...c,status:"preparing",packedAt:null,deliveredAt:null})))};
  const dn=custs.filter(c=>c.status==="delivered").length,pk=custs.filter(c=>c.status==="packed").length;
  const ur=custs.filter(c=>c.status==="preparing"&&t2m(c.deadline)-now<=60&&t2m(c.deadline)-now>0).length;
  const ov=custs.filter(c=>c.status==="preparing"&&now>t2m(c.deadline)).length;

      <div><h1 style={{fontSize:22,fontWeight:900,color:"#0f172a"}}>🐟 中原水産タスク管理</h1><span style={{fontSize:10,color:"#22c55e",fontWeight:600}}>● 同期中</span></div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        <button style={{...P.pb,...(pan==="data"?P.pa:{})}} onClick={()=>setPan(pan==="data"?null:"data")}>📈 データ</button>
        <button style={{...P.pb,...(pan==="cust"?P.pa:{})}} onClick={()=>setPan(pan==="cust"?null:"cust")}>📦 出荷</button>
        <button style={{...P.pb,...(pan==="shift"?P.pa:{})}} onClick={()=>setPan(pan==="shift"?null:"shift")}>📋 シフト</button>
        <button style={{...P.pb,...(pan==="rpt"?P.pa:{})}} onClick={()=>setPan(pan==="rpt"?null:"rpt")}>📊 レポート</button>
        <button style={P.ab} onClick={()=>setSF(!sf)}>{sf?"✕":"＋"}</button>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
      <div style={P.sc}><div style={{fontSize:24,fontWeight:900}}>{tasks.filter(t=>t.status!=="done").length}</div><div style={{fontSize:11,color:"#64748b"}}>残タスク</div></div>
      <div style={P.sc}><div style={{fontSize:24,fontWeight:900,color:"#22c55e"}}>{tDone}</div><div style={{fontSize:11,color:"#64748b"}}>本日完了</div></div>
      <div style={P.sc}><div style={{fontSize:24,fontWeight:900,color:tOD>0?"#ef4444":"#94a3b8"}}>{tOD}</div><div style={{fontSize:11,color:"#64748b"}}>期限超過</div></div>
      <div style={P.sc}><div style={{fontSize:24,fontWeight:900,color:"#3b82f6"}}>{mem.length}</div><div style={{fontSize:11,color:"#64748b"}}>メンバー</div></div>
    </div>
    <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:14}}>
      {mem.map((m,i)=>{const l=mL[i];return(<div key={m+i} style={{...P.mc,borderTop:"3px solid "+mc(i),flexShrink:0}} onClick={()=>setFil(fil===m?"all":m)}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><div style={{width:24,height:24,borderRadius:"50%",background:mc(i),color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{m[0]}</div>{eM===i?<input ref={mRef} value={mI} onChange={e=>setMI(e.target.value)} onBlur={()=>svE(i)} onKeyDown={e=>{e.key==="Enter"&&svE(i);e.stopPropagation()}} onClick={e=>e.stopPropagation()} style={{fontSize:11,fontWeight:600,border:"1px solid #3b82f6",borderRadius:4,padding:"2px 4px",outline:"none",width:65}}/>:<span style={{fontSize:11,fontWeight:600,color:fil===m?"#0f172a":"#475569",whiteSpace:"nowrap"}}>{m}</span>}<button onClick={e=>{e.stopPropagation();sE(i)}} style={{background:"none",border:"none",color:"#94a3b8",fontSize:10}}>✎</button><button onClick={e=>{e.stopPropagation();rMe(i)}} style={{background:"none",border:"none",color:"#d1d5db",fontSize:10}}>✕</button></div><div style={{display:"flex",gap:6,fontSize:10}}><span style={{color:"#f59e0b",fontWeight:600}}>{l.total}件</span><span style={{color:"#22c55e"}}>{l.done}完</span>{l.od>0&&<span style={{color:"#ef4444",fontWeight:700}}>⚠{l.od}</span>}</div>{fil===m&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:mc(i),borderRadius:2}}/>}</div>)})}
      {aM?<div style={{...P.mc,flexShrink:0,display:"flex",alignItems:"center",gap:6}}><input value={nMN} onChange={e=>setNMN(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")aMe();if(e.key==="Escape"){setAM(false);setNMN("")}}} placeholder="名前..." style={{fontSize:11,border:"1px solid #3b82f6",borderRadius:4,padding:"2px 4px",outline:"none",width:70}} autoFocus/><button onClick={aMe} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:4,fontSize:10,padding:"3px 8px",fontWeight:600}}>OK</button></div>
      :<div onClick={()=>setAM(true)} style={{...P.mc,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",border:"2px dashed #e2e8f0",cursor:"pointer",minWidth:80}}><span style={{color:"#94a3b8",fontSize:13,fontWeight:600}}>＋</span></div>}
    </div>

    {pan==="data"&&<DataPanel logs={logs} onClear={()=>{if(confirm("履歴全削除？"))sLg([])}}/>}
    {pan==="cust"&&<CustPanel custs={custs} onUpd={hCU}/>}
    {pan==="shift"&&<ShiftPanel members={mem} shifts={shifts} onUpd={sSh}/>}
    {pan==="rpt"&&<div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e2e8f0",marginBottom:16}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>📊 月間レポート</h3><div style={{display:"flex",gap:10,alignItems:"flex-end",height:160,marginBottom:10}}>{mD.map(d=>(<div key={d.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",height:120,display:"flex",alignItems:"flex-end",background:"#f8fafc",borderRadius:6,overflow:"hidden"}}><div style={{display:"flex",flexDirection:"column-reverse",width:"100%",height:"100%"}}>{mem.map((m,i)=>{const v=d.pm[m]||0;if(!v)return null;return<div key={m} style={{width:"100%",height:(v/mxB)*100+"%",background:mc(i),minHeight:3}} title={m+":"+v}/>})}</div></div><span style={{fontSize:11,color:"#64748b"}}>{d.label}</span><span style={{fontSize:10,color:"#94a3b8"}}>{d.total}件</span></div>))}</div><div style={{marginTop:14,borderTop:"1px solid #f1f5f9",paddingTop:12}}><h4 style={{fontSize:13,fontWeight:600,color:"#475569",marginBottom:8}}>負荷</h4><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>{mL.map((l,i)=>(<div key={l.name} style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px",borderLeft:"3px solid "+mc(i)}}><div style={{fontSize:11,fontWeight:600,marginBottom:4}}>{l.name}</div><div style={{display:"flex",gap:8,fontSize:10}}><span>残<b style={{color:"#f59e0b"}}>{l.total}</b></span><span>完了<b style={{color:"#22c55e"}}>{l.done}</b></span>{l.od>0&&<span style={{color:"#ef4444"}}>遅延<b>{l.od}</b></span>}</div>{l.total+l.done>0&&<div style={{marginTop:4,height:4,background:"#e2e8f0",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:"#22c55e",borderRadius:2,width:l.done/(l.total+l.done)*100+"%"}}/></div>}</div>))}</div></div></div>}

    {sf&&<div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e2e8f0",marginBottom:16,animation:"slideIn 0.2s ease"}}><input placeholder="タスク名..." value={nt.title} onChange={e=>setNt(p=>({...p,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&nt.assignees.length>0&&addTask()} style={{width:"100%",padding:"10px 12px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:14,outline:"none",marginBottom:10}} autoFocus/><textarea placeholder="メモ（任意）" value={nt.memo} onChange={e=>setNt(p=>({...p,memo:e.target.value}))} style={{width:"100%",padding:"8px 12px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,outline:"none",marginBottom:10,resize:"vertical",minHeight:50}} rows={2}/><p style={{fontSize:11,color:"#64748b",marginBottom:6}}>担当者（複数可）</p><div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>{mem.map((m,i)=>{const s=nt.assignees.includes(m);return<button key={m} onClick={()=>togA(m)} style={{padding:"5px 10px",borderRadius:6,border:"1.5px solid "+(s?mc(i):"#e2e8f0"),fontSize:11,background:s?mc(i)+"15":"#fafafa",color:s?mc(i):"#94a3b8",fontWeight:s?600:400}}>{s?"✓ ":""}{m}</button>})}</div><div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}><select value={nt.priority} onChange={e=>setNt(p=>({...p,priority:e.target.value}))} style={P.sl}>{PR.map(p=><option key={p.id} value={p.id}>優先度:{p.label}</option>)}</select><select value={nt.tag} onChange={e=>setNt(p=>({...p,tag:e.target.value}))} style={P.sl}><option value="">タグ</option>{TG.map(t=><option key={t} value={t}>{t}</option>)}</select><input type="date" value={nt.dueDate} onChange={e=>setNt(p=>({...p,dueDate:e.target.value}))} style={{...P.sl,cursor:"text"}}/><button onClick={addTask} style={{...P.ab,opacity:nt.title.trim()&&nt.assignees.length?1:.5,marginLeft:"auto",padding:"8px 16px",fontSize:13}}>追加({nt.assignees.length}人)</button></div></div>}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}><div style={{display:"flex",gap:5,flexWrap:"wrap"}}><button style={{...P.pill,...(fil==="all"?P.pillAct:{})}} onClick={()=>setFil("all")}>全員({tasks.length})</button>{mem.map((m,i)=>{const c=tasks.filter(t=>ga(t).includes(m)).length;return<button key={m} style={{...P.pill,...(fil===m?{background:mc(i),color:"#fff",borderColor:mc(i)}:{})}} onClick={()=>setFil(fil===m?"all":m)}>{m}({c})</button>})}</div><div style={{display:"flex",gap:4}}><button style={{...P.pill,...(vm==="board"?P.pillAct:{})}} onClick={()=>setVM("board")}>ボード</button><button style={{...P.pill,...(vm==="list"?P.pillAct:{})}} onClick={()=>setVM("list")}>リスト</button></div></div>

    {vm==="board"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>{ST.map(s=>{const col=filt.filter(t=>t.status===s.id).sort((a,b)=>({high:0,mid:1,low:2})[a.priority]-({high:0,mid:1,low:2})[b.priority]);return(<div key={s.id}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><span style={{fontSize:13,fontWeight:700,color:s.color}}>{s.icon}</span><span style={{fontSize:13,fontWeight:600,color:"#334155"}}>{s.label}</span><span style={{fontSize:11,color:"#94a3b8",background:"#f1f5f9",padding:"1px 7px",borderRadius:8}}>{col.length}</span></div><div style={{display:"flex",flexDirection:"column",gap:6}}>{col.map(t=><TaskCard key={t.id} task={t} mem={mem} onSt={uSt} onDel={dT} onDup={dpT} isOD={isOD} fD={fD} ga={ga}/>)}{!col.length&&<p style={{fontSize:11,color:"#d1d5db",textAlign:"center",padding:16}}>なし</p>}</div></div>)})}</div>}

    {vm==="list"&&<div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden"}}>{filt.sort((a,b)=>({high:0,mid:1,low:2})[a.priority]-({high:0,mid:1,low:2})[b.priority]).map((t,ti)=>{const p=PR.find(x=>x.id===t.priority)||PR[1];const od=isOD(t);const s=ST.find(x=>x.id===t.status);return(<div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:"1px solid #f1f5f9",background:ti%2===0?"#fff":"#fafbfc"}}><button onClick={()=>{const o=["todo","doing","done"];uSt(t.id,o[(o.indexOf(t.status)+1)%3])}} style={{width:22,height:22,borderRadius:"50%",border:"2px solid "+s.color,background:t.status==="done"?s.color:"transparent",color:t.status==="done"?"#fff":s.color,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{t.status==="done"?"✓":""}</button><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:t.status==="done"?"#94a3b8":"#1e293b",textDecoration:t.status==="done"?"line-through":"none"}}>{t.title}</div>{t.memo&&<div style={{fontSize:10,color:"#94a3b8",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.memo}</div>}</div>{t.tag&&<span className="tag" style={{background:"#f0f9ff",color:"#0369a1"}}>{t.tag}</span>}<div style={{display:"flex",gap:2}}>{ga(t).map(a=>{const i=mem.indexOf(a);return<span key={a} style={{width:20,height:20,borderRadius:"50%",background:i>=0?mc(i):"#94a3b8",color:"#fff",fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}} title={a}>{a[0]}</span>})}</div><span style={{fontSize:10,fontWeight:600,color:p.color}}>{p.label}</span>{t.dueDate&&<span style={{fontSize:10,color:od?"#ef4444":"#94a3b8",fontWeight:od?700:400,whiteSpace:"nowrap"}}>{od?"⚠":"📅"}{fD(t.dueDate)}</span>}<button onClick={()=>dpT(t)} style={{background:"none",border:"none",color:"#cbd5e1",fontSize:13}}>⧉</button><button onClick={()=>dT(t.id)} style={{background:"none",border:"none",color:"#cbd5e1",fontSize:12}}>✕</button></div>)})}{!filt.length&&<p style={{padding:24,textAlign:"center",color:"#d1d5db",fontSize:12}}>なし</p>}</div>}

    {tasks.length>0&&<div style={{textAlign:"center",marginTop:20}}><button onClick={()=>{if(confirm("全削除？"))sT([])}} style={{background:"none",border:"none",color:"#94a3b8",fontSize:11,textDecoration:"underline"}}>全タスク削除</button></div>}
  </div></div>);
}

const P={pill:{padding:"4px 10px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:16,fontSize:11,color:"#64748b",fontWeight:500},pillAct:{background:"#0f172a",color:"#fff",borderColor:"#0f172a"},pb:{padding:"8px 12px",background:"#fff",color:"#475569",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,fontWeight:500},pa:{background:"#0f172a",color:"#fff",borderColor:"#0f172a"},ab:{padding:"8px 16px",background:"#2563eb",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600},sl:{padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:12,background:"#fff",outline:"none"},sc:{background:"#fff",borderRadius:10,padding:"12px 14px",border:"1px solid #e2e8f0",textAlign:"center"},mc:{position:"relative",background:"#fff",borderRadius:8,padding:"8px 10px",border:"1px solid #e2e8f0",minWidth:110,cursor:"pointer"},th:{padding:"8px 6px",fontSize:10,fontWeight:600,color:"#64748b",background:"#f8fafc",position:"sticky",top:0,textAlign:"center",whiteSpace:"nowrap"},timeCell:{padding:"6px 10px",fontSize:11,fontWeight:600,color:"#334155",textAlign:"center",whiteSpace:"nowrap",background:"#fafbfc",position:"sticky",left:0,zIndex:1}};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
