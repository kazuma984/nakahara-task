function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function mc(i){return COLORS[((i%COLORS.length)+COLORS.length)%COLORS.length]}
function mKey(d){const x=new Date(d);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}`}
function mLabel(k){return`${parseInt(k.split("-")[1])}月`}
function last6(){const r=[],n=new Date();for(let i=5;i>=0;i--)r.push(mKey(new Date(n.getFullYear(),n.getMonth()-i,1)));return r}
function todayStr(){return new Date().toISOString().split("T")[0]}
function timeToMin(t){if(!t||typeof t!=="string")return 0;const p=t.split(":");if(p.length<2)return 0;const[h,m]=p.map(Number);if(isNaN(h)||isNaN(m))return 0;return h*60+m}
function nowMin(){const d=new Date();return d.getHours()*60+d.getMinutes()}
function nowTimeStr(){const d=new Date();return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`}
function fmtTime(min){const h=Math.floor(min/60)%24;const m=min%60;return`${h}:${String(m).padStart(2,"0")}`}

}

function CustomerPanel({customers,onUpdate}){
  const[adding,setAdding]=useState(false);const[nc,setNc]=useState({name:"",deadline:"",delivery:""});
  const[editCust,setEditCust]=useState(null);
  const now=nowMin();const nt=nowTimeStr();const TSTART=0;const TEND=15*60;
  const sorted=[...customers].sort((a,b)=>timeToMin(a.delivery)-timeToMin(b.delivery));
  const cycleStatus=(id)=>{const order=["preparing","packed","delivered"];onUpdate(customers.map(c=>{if(c.id!==id)return c;const ni=(order.indexOf(c.status)+1)%3;return{...c,status:order[ni]}}))};
  const addCust=()=>{if(!nc.name.trim()||!nc.deadline||!nc.delivery)return;onUpdate([...customers,{id:uid(),name:nc.name.trim(),deadline:nc.deadline,delivery:nc.delivery,status:"preparing",memo:""}]);setNc({name:"",deadline:"",delivery:""});setAdding(false)};
  const delCust=(id)=>{if(confirm("この得意先を削除？"))onUpdate(customers.filter(c=>c.id!==id))};
  const saveCustEdit=(id,dl,dv)=>{onUpdate(customers.map(c=>c.id===id?{...c,deadline:dl,delivery:dv}:c));setEditCust(null)};
  const resetAll=()=>{if(confirm("全得意先のステータスを準備中に戻す？"))onUpdate(customers.map(c=>({...c,status:"preparing"})))};
  const pct=(min)=>Math.max(0,Math.min(100,((min-TSTART)/(TEND-TSTART))*100));const nowPct=pct(now);
  const doneCount=customers.filter(c=>c.status==="delivered").length;const packedCount=customers.filter(c=>c.status==="packed").length;
  const urgentCount=customers.filter(c=>c.status==="preparing"&&timeToMin(c.deadline)-now<=60&&timeToMin(c.deadline)-now>0).length;
  const overdueCount=customers.filter(c=>c.status==="preparing"&&now>timeToMin(c.deadline)).length;
  // Time ruler: 3-hour intervals for mobile readability
  const rulerHours=[0,3,6,9,12,15];
  return(<div style={{background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",marginBottom:16,overflow:"hidden"}}>
    <div style={{padding:"14px 18px 10px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <h3 style={{fontSize:15,fontWeight:700,color:"#1e293b"}}>📦 出荷管理</h3>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:11,color:"#64748b",background:"#f1f5f9",padding:"3px 10px",borderRadius:6}}>現在 {nt}</span>
          <button onClick={resetAll} style={{fontSize:10,color:"#94a3b8",background:"none",border:"1px solid #e2e8f0",borderRadius:6,padding:"3px 8px"}}>全リセット</button>
          <button onClick={()=>setAdding(!adding)} style={{fontSize:10,color:"#fff",background:"#2563eb",border:"none",borderRadius:6,padding:"3px 10px",fontWeight:600}}>{adding?"✕":"＋ 追加"}</button>
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:8,fontSize:11,flexWrap:"wrap"}}>
        {overdueCount>0&&<span style={{color:"#ef4444",fontWeight:700,background:"#fef2f2",padding:"2px 8px",borderRadius:4}}>⚠ 締切超過 {overdueCount}</span>}
        {urgentCount>0&&<span style={{color:"#f59e0b",fontWeight:700,background:"#fffbeb",padding:"2px 8px",borderRadius:4}}>⏰ あと1時間以内 {urgentCount}</span>}
        <span style={{color:"#3b82f6",background:"#eff6ff",padding:"2px 8px",borderRadius:4}}>梱包済 {packedCount}</span>
        <span style={{color:"#22c55e",background:"#f0fdf4",padding:"2px 8px",borderRadius:4}}>搬入済 {doneCount}/{customers.length}</span>
      </div>
    </div>
    {adding&&(<div style={{padding:"10px 18px",borderTop:"1px solid #f1f5f9",background:"#fafbfc",animation:"slideIn 0.2s ease"}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <input value={nc.name} onChange={e=>setNc(p=>({...p,name:e.target.value}))} placeholder="得意先名" style={{padding:"8px 12px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:14,outline:"none",width:140}}/>
        <label style={{fontSize:12,color:"#64748b"}}>締切<input type="time" value={nc.deadline} onChange={e=>setNc(p=>({...p,deadline:e.target.value}))} style={{marginLeft:4,padding:"6px 8px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:14}}/></label>
        <label style={{fontSize:12,color:"#64748b"}}>搬入<input type="time" value={nc.delivery} onChange={e=>setNc(p=>({...p,delivery:e.target.value}))} style={{marginLeft:4,padding:"6px 8px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:14}}/></label>
        <button onClick={addCust} style={{padding:"8px 16px",background:"#2563eb",color:"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:600}}>追加</button>

        {rulerHours.map(h=>(<div key={h} style={{position:"absolute",left:`${pct(h*60)}%`,transform:"translateX(-50%)",textAlign:"center"}}>
          <span style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{h}時</span>
          <div style={{position:"absolute",top:16,left:"50%",width:1,height:6,background:"#e2e8f0"}}/>
        </div>))}
      </div>
      {/* Customer rows */}
      {sorted.map((c,ci)=>{const dlMin=timeToMin(c.deadline);const dvMin=timeToMin(c.delivery);const st=CSTATUS.find(s=>s.id===c.status)||CSTATUS[0];const isOverdue=c.status==="preparing"&&now>dlMin;const isUrgent=c.status==="preparing"&&!isOverdue&&dlMin-now<=60;const rowBg=isOverdue?"#fef2f2":isUrgent?"#fffbeb":"#fff";
        const dlPct=pct(dlMin);const dvPct=pct(dvMin);
        // Remaining time text
        const remaining=dlMin-now;
        const remText=c.status!=="preparing"?"":remaining<=0?"超過":remaining<60?`あと${remaining}分`:`あと${Math.floor(remaining/60)}時間${remaining%60>0?(remaining%60+"分"):""}`;
        return(<div key={c.id} style={{display:"flex",alignItems:"center",borderTop:ci>0?"1px solid #f1f5f9":"none",background:rowBg,padding:"8px 0",minHeight:48}}>
          {/* Left: name + status */}
          <div style={{width:100,flexShrink:0,padding:"0 8px"}}>
            <div style={{display:"flex",alignItems:"center",gap:3}}>
              <span style={{fontSize:12,fontWeight:700,color:"#1e293b"}}>{c.name}</span>
              <button onClick={()=>setEditCust(c)} style={{fontSize:12,color:"#3b82f6",background:"none",border:"none",padding:"2px"}}>✎</button>
              <button onClick={()=>delCust(c.id)} style={{fontSize:12,color:"#d1d5db",background:"none",border:"none",padding:"2px"}}>✕</button>
            </div>
            <button onClick={()=>cycleStatus(c.id)} style={{marginTop:3,padding:"3px 8px",borderRadius:5,fontSize:10,fontWeight:600,border:`1px solid ${st.color}40`,background:st.bg,color:st.color,minWidth:50,textAlign:"center"}}>{st.label}</button>
          </div>
          {/* Middle: timeline */}
          <div style={{flex:1,position:"relative",height:32,marginRight:4}}>
            {/* Background track */}
            <div style={{position:"absolute",top:12,left:0,right:0,height:8,background:"#f1f5f9",borderRadius:4}}/>
            {/* "Progress" bar from 0 to current time - shows how much time has passed */}
            {now>0&&<div style={{position:"absolute",top:12,left:0,width:`${Math.min(nowPct,dvPct)}%`,height:8,background:isOverdue?"#fca5a540":"#e2e8f0",borderRadius:4,transition:"width 1s linear"}}/>}
            {/* Zone between deadline and delivery */}
            {dlPct<dvPct&&<div style={{position:"absolute",top:12,left:`${dlPct}%`,width:`${dvPct-dlPct}%`,height:8,background:st.color+"25",borderRadius:4}}/>}
            {/* Current time - red line approaching deadline */}
            <div style={{position:"absolute",top:4,left:`${nowPct}%`,width:2.5,height:24,background:"#ef4444",borderRadius:2,zIndex:3,transition:"left 1s linear"}}>
              <div style={{position:"absolute",top:-2,left:-3,width:8,height:8,borderRadius:"50%",background:"#ef4444"}}/>
            </div>
            {/* Deadline marker - ⏰ */}
            <div style={{position:"absolute",top:6,left:`${dlPct}%`,width:2,height:20,background:isOverdue?"#ef4444":"#f59e0b",borderRadius:1,zIndex:2}}>
              <span style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)",fontSize:10,whiteSpace:"nowrap"}}>⏰</span>
            </div>
            {/* Delivery marker - 🚛 */}
            <div style={{position:"absolute",top:6,left:`${dvPct}%`,width:2,height:20,background:"#3b82f6",borderRadius:1,zIndex:2}}>
              <span style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)",fontSize:10,whiteSpace:"nowrap"}}>🚛</span>
            </div>
          </div>
          {/* Right: times + remaining */}
          <div style={{width:66,flexShrink:0,paddingRight:8,textAlign:"right"}}>
            <div style={{fontSize:10,color:"#f59e0b",fontWeight:600}}>締 {c.deadline||"--:--"}</div>
            <div style={{fontSize:10,color:"#3b82f6",fontWeight:600}}>搬 {c.delivery||"--:--"}</div>
            {c.status==="preparing"&&remText&&<div style={{fontSize:9,fontWeight:700,color:isOverdue?"#ef4444":isUrgent?"#f59e0b":"#94a3b8",marginTop:1}}>{remText}</div>}
          </div>
        </div>)})}
    </div>
    <div style={{display:"flex",gap:12,padding:"8px 18px 12px",borderTop:"1px solid #f1f5f9",fontSize:10,color:"#64748b",flexWrap:"wrap"}}>
      <span>🔴 現在時刻</span><span>⏰ 締め時間</span><span>🚛 搬入時間</span>
      <span style={{marginLeft:"auto"}}>ステータスをタップで切替</span>
    </div>
    {editCust&&<EditModal customer={editCust} onSave={saveCustEdit} onClose={()=>setEditCust(null)}/>}
  </div>);
}

function TaskCard({task,members,onStatus,onDelete,onDup,isOD,fmtD,ga}){
  const[ex,setEx]=useState(false);const pri=PRIORITIES.find(p=>p.id===task.priority)||PRIORITIES[1];const od=isOD(task);
  return(<div className="hov" style={{background:"#fff",borderRadius:10,padding:"10px 12px",border:"1px solid #e2e8f0",borderLeft:`3px solid ${pri.color}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
      <span onClick={()=>setEx(!ex)} style={{fontSize:12,fontWeight:500,color:"#1e293b",lineHeight:1.4,flex:1,cursor:"pointer"}}>{task.title}</span>
      <div style={{display:"flex",gap:2}}><button onClick={()=>onDup(task)} title="複製" style={{background:"none",border:"none",color:"#d1d5db",fontSize:12}}>⧉</button><button onClick={()=>onDelete(task.id)} style={{background:"none",border:"none",color:"#d1d5db",fontSize:11}}>✕</button></div>
    </div>
    {task.memo&&ex&&<div style={{fontSize:10,color:"#64748b",lineHeight:1.6,marginBottom:6,padding:"6px 8px",background:"#f8fafc",borderRadius:6,whiteSpace:"pre-wrap"}}>{task.memo}</div>}
    {task.memo&&!ex&&<div style={{fontSize:10,color:"#94a3b8",marginBottom:4,cursor:"pointer"}} onClick={()=>setEx(true)}>📝 メモあり</div>}
    <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:6,alignItems:"center"}}>
      {ga(task).map(a=>{const i=members.indexOf(a);return<span key={a} style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:4,background:(i>=0?mc(i):"#94a3b8")+"18",color:i>=0?mc(i):"#94a3b8"}}>{a}</span>})}
      {task.tag&&<span className="tag" style={{background:"#f0f9ff",color:"#0369a1"}}>{task.tag}</span>}
      {task.dueDate&&<span style={{fontSize:9,color:od?"#ef4444":"#64748b",fontWeight:od?700:400}}>{od?"⚠ ":""}{fmtD(task.dueDate)}</span>}
    </div>
    <div style={{display:"flex",gap:3}}>
      {STATUSES.map(st=>(<button key={st.id} onClick={()=>onStatus(task.id,st.id)} style={{flex:1,padding:"3px 0",borderRadius:5,fontSize:10,textAlign:"center",fontFamily:"'Noto Sans JP',sans-serif",background:task.status===st.id?st.bg:"transparent",color:task.status===st.id?st.color:"#cbd5e1",fontWeight:task.status===st.id?600:400,border:`1px solid ${task.status===st.id?st.color+"40":"#e2e8f0"}`,transition:"all .12s ease"}}>{st.label}</button>))}
    </div>
  </div>);
}

function App(){
  const[tasks,setTasks]=useState([]);const[members,setMembers]=useState(SHIFT_MEMBERS);const[customers,setCustomers]=useState(DEFAULT_CUSTOMERS);
  const[editMem,setEditMem]=useState(null);const[memIn,setMemIn]=useState("");const[showForm,setShowForm]=useState(false);const[filter,setFilter]=useState("all");
  const[panel,setPanel]=useState(null);const[nt,setNt]=useState({title:"",assignees:[],priority:"mid",dueDate:"",memo:"",tag:""});
  const[loaded,setLoaded]=useState(false);const[addingMem,setAddingMem]=useState(false);const[newMemName,setNewMemName]=useState("");const[viewMode,setViewMode]=useState("board");
  const skipUntil=useRef(0);const mRef=useRef(null);

  useEffect(()=>{
    if(FB_OK){
      const shouldSkip=()=>Date.now()<skipUntil.current;
      const u1=fbL("tasks",v=>{if(shouldSkip())return;setTasks(v?Object.values(v):[])});
      const u2=fbL("members",v=>{if(shouldSkip())return;if(v&&v.length>0)setMembers(v)});
      const u3=fbL("customers",v=>{if(shouldSkip())return;if(v)setCustomers(Array.isArray(v)?v:Object.values(v))});
      setLoaded(true);return()=>{u1();u2();u3()};
    }else{
      try{const d=JSON.parse(localStorage.getItem("nakahara-v3")||"null");if(d){if(d.tasks)setTasks(d.tasks);if(d.members?.length)setMembers(d.members);if(d.customers?.length)setCustomers(d.customers)}}catch(e){}
      setLoaded(true);
    }
  },[]);

  const save=useCallback((t,m,c)=>{
    if(FB_OK){skipUntil.current=Date.now()+1500;const tm={};t.forEach(x=>{tm[x.id]=x});fbW("tasks",tm);fbW("members",m);fbW("customers",c)}
    else localStorage.setItem("nakahara-v3",JSON.stringify({tasks:t,members:m,customers:c}));
  },[]);

  const sT=(fn)=>setTasks(p=>{const n=typeof fn==="function"?fn(p):fn;setTimeout(()=>save(n,members,customers),0);return n});
  const sM=(fn)=>setMembers(p=>{const n=typeof fn==="function"?fn(p):fn;setTimeout(()=>save(tasks,n,customers),0);return n});
  const sC=(newC)=>{setCustomers(newC);setTimeout(()=>save(tasks,members,newC),0)};
  const togA=(n)=>setNt(p=>({...p,assignees:p.assignees.includes(n)?p.assignees.filter(a=>a!==n):[...p.assignees,n]}));

  const addTask=()=>{if(!nt.title.trim()||nt.assignees.length===0)return;sT(p=>[...p,{id:uid(),title:nt.title,assignees:nt.assignees,priority:nt.priority,dueDate:nt.dueDate,memo:nt.memo,tag:nt.tag,status:"todo",createdAt:new Date().toISOString(),completedAt:null}]);setNt({title:"",assignees:[],priority:"mid",dueDate:"",memo:"",tag:""});setShowForm(false)};
  const updSt=(id,st)=>sT(p=>p.map(t=>t.id===id?{...t,status:st,completedAt:st==="done"?new Date().toISOString():null}:t));
  const delTask=(id)=>sT(p=>p.filter(t=>t.id!==id));
  const dupTask=(task)=>sT(p=>[...p,{...task,id:uid(),status:"todo",createdAt:new Date().toISOString(),completedAt:null}]);
  const startEdit=(i)=>{setEditMem(i);setMemIn(members[i]);setTimeout(()=>mRef.current?.focus(),50)};
  const saveEdit=(i)=>{if(memIn.trim()){const o=members[i],n=memIn.trim();sM(p=>p.map((m,j)=>j===i?n:m));sT(p=>p.map(t=>({...t,assignees:(t.assignees||[]).map(a=>a===o?n:a)})))}setEditMem(null);setMemIn("")};
  const addMem=()=>{const n=newMemName.trim();if(!n||members.includes(n))return;sM(p=>[...p,n]);setNewMemName("");setAddingMem(false)};
  const removeMem=(i)=>{if(members.length<=1)return;if(!confirm(`「${members[i]}」を削除？`))return;const n=members[i];sM(p=>p.filter((_,j)=>j!==i));sT(p=>p.map(t=>({...t,assignees:(t.assignees||[]).filter(a=>a!==n)})).filter(t=>(t.assignees||[]).length>0));if(filter===n)setFilter("all")};

  const ga=(t)=>t.assignees||[];const filtered=filter==="all"?tasks:tasks.filter(t=>ga(t).includes(filter));
  const isOD=(t)=>t.dueDate&&t.status!=="done"&&new Date(t.dueDate)<new Date(todayStr());
  const fmtD=(d)=>{if(!d)return"";const x=new Date(d);return`${x.getMonth()+1}/${x.getDate()}`};
  const today=todayStr();const todayDone=tasks.filter(t=>t.completedAt?.startsWith(today)).length;const todayOD=tasks.filter(t=>isOD(t)).length;
  const months=last6();const mData=months.map(mk=>{const pm={};members.forEach(m=>{pm[m]=0});tasks.forEach(t=>{if(t.status==="done"&&t.completedAt&&mKey(t.completedAt)===mk)ga(t).forEach(a=>{if(pm[a]!==undefined)pm[a]++})});return{key:mk,label:mLabel(mk),pm,total:Object.values(pm).reduce((a,b)=>a+b,0)}});
  const maxBar=Math.max(1,...mData.map(d=>d.total));
  const memLoad=members.map(m=>({name:m,total:tasks.filter(t=>ga(t).includes(m)&&t.status!=="done").length,done:tasks.filter(t=>ga(t).includes(m)&&t.status==="done").length,od:tasks.filter(t=>ga(t).includes(m)&&isOD(t)).length}));

  if(!loaded)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#94a3b8"}}>読み込み中...</div>;

  return(<div style={{padding:"20px 12px"}}><div style={{maxWidth:1100,margin:"0 auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
      <div><h1 style={{fontSize:22,fontWeight:900,color:"#0f172a"}}>🐟 中原水産タスク管理</h1><span style={{fontSize:10,color:"#22c55e",fontWeight:600}}>● リアルタイム同期中</span></div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        <button style={{...P.panelBtn,...(panel==="customer"?P.panelAct:{})}} onClick={()=>setPanel(panel==="customer"?null:"customer")}>📦 出荷</button>
        <button style={{...P.panelBtn,...(panel==="shift"?P.panelAct:{})}} onClick={()=>setPanel(panel==="shift"?null:"shift")}>📋 シフト</button>
        <button style={{...P.panelBtn,...(panel==="report"?P.panelAct:{})}} onClick={()=>setPanel(panel==="report"?null:"report")}>📊 レポート</button>
        <button style={P.addBtn} onClick={()=>setShowForm(!showForm)}>{showForm?"✕":"＋ 追加"}</button>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
      <div style={P.statCard}><div style={{fontSize:24,fontWeight:900,color:"#0f172a"}}>{tasks.filter(t=>t.status!=="done").length}</div><div style={{fontSize:11,color:"#64748b"}}>残タスク</div></div>
      <div style={P.statCard}><div style={{fontSize:24,fontWeight:900,color:"#22c55e"}}>{todayDone}</div><div style={{fontSize:11,color:"#64748b"}}>本日完了</div></div>
      <div style={P.statCard}><div style={{fontSize:24,fontWeight:900,color:todayOD>0?"#ef4444":"#94a3b8"}}>{todayOD}</div><div style={{fontSize:11,color:"#64748b"}}>期限超過</div></div>
      <div style={P.statCard}><div style={{fontSize:24,fontWeight:900,color:"#3b82f6"}}>{members.length}</div><div style={{fontSize:11,color:"#64748b"}}>メンバー</div></div>
    </div>

    <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:14}}>
      {members.map((m,i)=>{const ld=memLoad[i];return(
        <div key={`${m}-${i}`} style={{...P.memCard,borderTop:`3px solid ${mc(i)}`,flexShrink:0}} onClick={()=>setFilter(filter===m?"all":m)}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:mc(i),color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{m[0]}</div>
            {editMem===i?<input ref={mRef} value={memIn} onChange={e=>setMemIn(e.target.value)} onBlur={()=>saveEdit(i)} onKeyDown={e=>{e.key==="Enter"&&saveEdit(i);e.stopPropagation()}} onClick={e=>e.stopPropagation()} style={{fontSize:11,fontWeight:600,border:"1px solid #3b82f6",borderRadius:4,padding:"2px 4px",outline:"none",width:65}}/>
            :<span style={{fontSize:11,fontWeight:600,color:filter===m?"#0f172a":"#475569",whiteSpace:"nowrap"}}>{m}</span>}
            <button onClick={e=>{e.stopPropagation();startEdit(i)}} style={{background:"none",border:"none",color:"#94a3b8",fontSize:10,padding:0}}>✎</button>
            <button onClick={e=>{e.stopPropagation();removeMem(i)}} style={{background:"none",border:"none",color:"#d1d5db",fontSize:10,padding:0}}>✕</button>
          </div>
          <div style={{display:"flex",gap:6,fontSize:10}}><span style={{color:"#f59e0b",fontWeight:600}}>{ld.total}件</span><span style={{color:"#22c55e"}}>{ld.done}完</span>{ld.od>0&&<span style={{color:"#ef4444",fontWeight:700}}>⚠{ld.od}</span>}</div>
          {filter===m&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:mc(i),borderRadius:2}}/>}
        </div>)})}
      {addingMem?(<div style={{...P.memCard,flexShrink:0,display:"flex",alignItems:"center",gap:6}}><input value={newMemName} onChange={e=>setNewMemName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addMem();if(e.key==="Escape"){setAddingMem(false);setNewMemName("")}}} placeholder="名前..." style={{fontSize:11,border:"1px solid #3b82f6",borderRadius:4,padding:"2px 4px",outline:"none",width:70}} autoFocus/><button onClick={addMem} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:4,fontSize:10,padding:"3px 8px",fontWeight:600}}>OK</button></div>
      ):(<div onClick={()=>setAddingMem(true)} style={{...P.memCard,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",border:"2px dashed #e2e8f0",cursor:"pointer",minWidth:80}}><span style={{color:"#94a3b8",fontSize:13,fontWeight:600}}>＋</span></div>)}
    </div>

    {panel==="customer"&&<CustomerPanel customers={customers} onUpdate={sC}/>}
    {panel==="shift"&&<ShiftPanel members={members}/>}
    {panel==="report"&&(<div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e2e8f0",marginBottom:16}}>
      <h3 style={{fontSize:15,fontWeight:700,color:"#1e293b",marginBottom:14}}>📊 月間レポート</h3>
      <div style={{display:"flex",gap:10,alignItems:"flex-end",height:160,marginBottom:10}}>
        {mData.map(md=>(<div key={md.key} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{width:"100%",height:120,display:"flex",alignItems:"flex-end",background:"#f8fafc",borderRadius:6,overflow:"hidden"}}><div style={{display:"flex",flexDirection:"column-reverse",width:"100%",height:"100%"}}>{members.map((m,mi)=>{const v=md.pm[m]||0;if(!v)return null;return<div key={m} style={{width:"100%",height:`${(v/maxBar)*100}%`,background:mc(mi),minHeight:3}} title={`${m}: ${v}件`}/>})}</div></div>
          <span style={{fontSize:11,color:"#64748b"}}>{md.label}</span><span style={{fontSize:10,color:"#94a3b8"}}>{md.total}件</span>
        </div>))}
      </div>
      <div style={{marginTop:14,borderTop:"1px solid #f1f5f9",paddingTop:12}}><h4 style={{fontSize:13,fontWeight:600,color:"#475569",marginBottom:8}}>負荷バランス</h4>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
          {memLoad.map((ml,i)=>(<div key={ml.name} style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px",borderLeft:`3px solid ${mc(i)}`}}>
            <div style={{fontSize:11,fontWeight:600,color:"#1e293b",marginBottom:4}}>{ml.name}</div>
            <div style={{display:"flex",gap:8,fontSize:10}}><span>残<b style={{color:"#f59e0b"}}> {ml.total}</b></span><span>完了<b style={{color:"#22c55e"}}> {ml.done}</b></span>{ml.od>0&&<span style={{color:"#ef4444"}}>遅延<b> {ml.od}</b></span>}</div>
            {ml.total+ml.done>0&&<div style={{marginTop:4,height:4,background:"#e2e8f0",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:"#22c55e",borderRadius:2,width:`${ml.done/(ml.total+ml.done)*100}%`}}/></div>}
          </div>))}
        </div>
      </div>
    </div>)}

    {showForm&&(<div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #e2e8f0",marginBottom:16,animation:"slideIn 0.2s ease"}}>
      <input placeholder="タスク名..." value={nt.title} onChange={e=>setNt(p=>({...p,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&nt.assignees.length>0&&addTask()} style={{width:"100%",padding:"10px 12px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:14,outline:"none",marginBottom:10}} autoFocus/>
      <textarea placeholder="メモ・手順（任意）" value={nt.memo} onChange={e=>setNt(p=>({...p,memo:e.target.value}))} style={{width:"100%",padding:"8px 12px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,outline:"none",marginBottom:10,resize:"vertical",minHeight:50}} rows={2}/>
      <p style={{fontSize:11,color:"#64748b",fontWeight:500,marginBottom:6}}>担当者（複数可）</p>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>{members.map((m,i)=>{const sel=nt.assignees.includes(m);return<button key={m} onClick={()=>togA(m)} style={{padding:"5px 10px",borderRadius:6,border:`1.5px solid ${sel?mc(i):"#e2e8f0"}`,fontSize:11,background:sel?mc(i)+"15":"#fafafa",color:sel?mc(i):"#94a3b8",fontWeight:sel?600:400}}>{sel?"✓ ":""}{m}</button>})}</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <select value={nt.priority} onChange={e=>setNt(p=>({...p,priority:e.target.value}))} style={P.sel}>{PRIORITIES.map(p=><option key={p.id} value={p.id}>優先度:{p.label}</option>)}</select>
        <select value={nt.tag} onChange={e=>setNt(p=>({...p,tag:e.target.value}))} style={P.sel}><option value="">得意先タグ</option>{TAGS.map(t=><option key={t} value={t}>{t}</option>)}</select>
        <input type="date" value={nt.dueDate} onChange={e=>setNt(p=>({...p,dueDate:e.target.value}))} style={{...P.sel,cursor:"text"}}/>
        <button onClick={addTask} style={{...P.addBtn,opacity:nt.title.trim()&&nt.assignees.length?1:.5,marginLeft:"auto",padding:"8px 16px",fontSize:13}}>追加（{nt.assignees.length}人）</button>
      </div>
    </div>)}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}><button style={{...P.pill,...(filter==="all"?P.pillAct:{})}} onClick={()=>setFilter("all")}>全員 ({tasks.length})</button>{members.map((m,i)=>{const c=tasks.filter(t=>ga(t).includes(m)).length;return<button key={m} style={{...P.pill,...(filter===m?{background:mc(i),color:"#fff",borderColor:mc(i)}:{})}} onClick={()=>setFilter(filter===m?"all":m)}>{m}({c})</button>})}</div>
      <div style={{display:"flex",gap:4}}><button style={{...P.pill,...(viewMode==="board"?P.pillAct:{})}} onClick={()=>setViewMode("board")}>ボード</button><button style={{...P.pill,...(viewMode==="list"?P.pillAct:{})}} onClick={()=>setViewMode("list")}>リスト</button></div>
    </div>

    {viewMode==="board"&&(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>{STATUSES.map(status=>{const col=filtered.filter(t=>t.status===status.id).sort((a,b)=>({high:0,mid:1,low:2})[a.priority]-({high:0,mid:1,low:2})[b.priority]);return(<div key={status.id}>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}><span style={{fontSize:13,fontWeight:700,color:status.color}}>{status.icon}</span><span style={{fontSize:13,fontWeight:600,color:"#334155"}}>{status.label}</span><span style={{fontSize:11,color:"#94a3b8",background:"#f1f5f9",padding:"1px 7px",borderRadius:8}}>{col.length}</span></div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>{col.map(task=><TaskCard key={task.id} task={task} members={members} onStatus={updSt} onDelete={delTask} onDup={dupTask} isOD={isOD} fmtD={fmtD} ga={ga}/>)}{!col.length&&<p style={{fontSize:11,color:"#d1d5db",textAlign:"center",padding:16}}>なし</p>}</div>
    </div>)})}</div>)}

    {viewMode==="list"&&(<div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden"}}>
      {filtered.sort((a,b)=>({high:0,mid:1,low:2})[a.priority]-({high:0,mid:1,low:2})[b.priority]).map((task,ti)=>{const pri=PRIORITIES.find(p=>p.id===task.priority)||PRIORITIES[1];const od=isOD(task);const st=STATUSES.find(s=>s.id===task.status);
        return(<div key={task.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:"1px solid #f1f5f9",background:ti%2===0?"#fff":"#fafbfc"}}>
          <button onClick={()=>{const ord=["todo","doing","done"];updSt(task.id,ord[(ord.indexOf(task.status)+1)%3])}} style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${st.color}`,background:task.status==="done"?st.color:"transparent",color:task.status==="done"?"#fff":st.color,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{task.status==="done"?"✓":""}</button>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:task.status==="done"?"#94a3b8":"#1e293b",textDecoration:task.status==="done"?"line-through":"none"}}>{task.title}</div>{task.memo&&<div style={{fontSize:10,color:"#94a3b8",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.memo}</div>}</div>
          {task.tag&&<span className="tag" style={{background:"#f0f9ff",color:"#0369a1"}}>{task.tag}</span>}
          <div style={{display:"flex",gap:2}}>{ga(task).map(a=>{const idx=members.indexOf(a);return<span key={a} style={{width:20,height:20,borderRadius:"50%",background:idx>=0?mc(idx):"#94a3b8",color:"#fff",fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}} title={a}>{a[0]}</span>})}</div>
          <span style={{fontSize:10,fontWeight:600,color:pri.color}}>{pri.label}</span>
          {task.dueDate&&<span style={{fontSize:10,color:od?"#ef4444":"#94a3b8",fontWeight:od?700:400,whiteSpace:"nowrap"}}>{od?"⚠":"📅"}{fmtD(task.dueDate)}</span>}
          <button onClick={()=>dupTask(task)} style={{background:"none",border:"none",color:"#cbd5e1",fontSize:13}}>⧉</button>
          <button onClick={()=>delTask(task.id)} style={{background:"none",border:"none",color:"#cbd5e1",fontSize:12}}>✕</button>
        </div>)})}
      {!filtered.length&&<p style={{padding:24,textAlign:"center",color:"#d1d5db",fontSize:12}}>タスクなし</p>}
    </div>)}

    {tasks.length>0&&<div style={{textAlign:"center",marginTop:20}}><button onClick={()=>{if(confirm("全タスク削除？"))sT([])}} style={{background:"none",border:"none",color:"#94a3b8",fontSize:11,textDecoration:"underline"}}>全タスク削除</button></div>}
  </div></div>);
}

const P={
  pill:{padding:"4px 10px",background:"#fff",border:"1px solid #e2e8f0",borderRadius:16,fontSize:11,color:"#64748b",fontWeight:500},
  pillAct:{background:"#0f172a",color:"#fff",borderColor:"#0f172a"},
  panelBtn:{padding:"8px 12px",background:"#fff",color:"#475569",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,fontWeight:500},
  panelAct:{background:"#0f172a",color:"#fff",borderColor:"#0f172a"},
  addBtn:{padding:"8px 16px",background:"#2563eb",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600},
  sel:{padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:12,background:"#fff",outline:"none"},
  statCard:{background:"#fff",borderRadius:10,padding:"12px 14px",border:"1px solid #e2e8f0",textAlign:"center"},
  memCard:{position:"relative",background:"#fff",borderRadius:8,padding:"8px 10px",border:"1px solid #e2e8f0",minWidth:110,cursor:"pointer"},
  th:{padding:"8px 6px",fontSize:10,fontWeight:600,color:"#64748b",background:"#f8fafc",position:"sticky",top:0,textAlign:"center",whiteSpace:"nowrap"},
  timeCell:{padding:"6px 10px",fontSize:11,fontWeight:600,color:"#334155",textAlign:"center",whiteSpace:"nowrap",background:"#fafbfc",position:"sticky",left:0,zIndex:1},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
